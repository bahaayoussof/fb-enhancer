name: Publish to Microsoft Edge Add-ons

on:
  release:
    types: [published]

jobs:
  publish-edge:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build and Package Extension
        # Run pwsh (PowerShell Core) on Linux to execute the custom zip script
        run: |
          npm run build
          pwsh bin/zip.ps1

      - name: Upload & Publish to Microsoft Edge Store
        uses: wbp-next/edge-extension-upload@v2
        with:
          product-id: ${{ secrets.EDGE_PRODUCT_ID }}
          client-id: ${{ secrets.EDGE_CLIENT_ID }}
          client-secret: ${{ secrets.EDGE_CLIENT_SECRET }}
          access-token-url: ${{ secrets.EDGE_ACCESS_TOKEN_URL }}
          file-path: ./fb-enhancer-v1.0.0.zip
