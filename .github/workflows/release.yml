name: Release

# Triggered by pushing a semantic version tag: v1.2.3
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write # needed to create GitHub Releases

jobs:
  # ── 1. Build, lint, package ──────────────────────────────────
  build:
    name: Build & Package
    uses: ./.github/workflows/_build.yml
    with:
      version: ${{ github.ref_name }} # e.g. "v1.2.3" — _build.yml strips the v

  # ── 2. Create GitHub Release ─────────────────────────────────
  github-release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: extension-zip

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: 'FB Enhancer ${{ github.ref_name }}'
          tag_name: ${{ github.ref_name }}
          files: '*.zip'
          generate_release_notes: true
          fail_on_unmatched_files: true

  # ── 3. Publish → Microsoft Edge Add-ons ─────────────────────
  publish-edge:
    name: 'Publish → Edge Add-ons'
    needs: github-release
    runs-on: ubuntu-latest
    environment: edge-production # requires approval gate in repo Settings

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: extension-zip

      - name: Acquire Edge API access token
        id: token
        env:
          EDGE_TENANT_ID: ${{ secrets.EDGE_TENANT_ID }}
          EDGE_CLIENT_ID: ${{ secrets.EDGE_CLIENT_ID }}
          EDGE_CLIENT_SECRET: ${{ secrets.EDGE_CLIENT_SECRET }}
        run: |
          RESPONSE=$(curl -sf -X POST \
            "https://login.microsoftonline.com/${EDGE_TENANT_ID}/oauth2/v2.0/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "client_id=${EDGE_CLIENT_ID}" \
            -d "client_secret=${EDGE_CLIENT_SECRET}" \
            -d "grant_type=client_credentials" \
            -d "scope=https://api.addons.microsoftedge.microsoft.com/.default")

          TOKEN=$(echo "$RESPONSE" | jq -r '.access_token // empty')
          if [ -z "$TOKEN" ]; then
            echo "ERROR: Failed to acquire access token"
            echo "$RESPONSE" | jq '.'
            exit 1
          fi

          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> $GITHUB_OUTPUT
          echo "Access token acquired"

      - name: Upload package to draft
        id: upload
        env:
          EDGE_PRODUCT_ID: ${{ secrets.EDGE_PRODUCT_ID }}
        run: |
          ZIP_FILE=$(ls *.zip | head -1)
          echo "Uploading: $ZIP_FILE ($(du -sh $ZIP_FILE | cut -f1))"

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://api.addons.microsoftedge.microsoft.com/v1/products/${EDGE_PRODUCT_ID}/submissions/draft/package" \
            -H "Authorization: Bearer ${{ steps.token.outputs.token }}" \
            -H "Content-Type: application/zip" \
            --data-binary "@${ZIP_FILE}")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          echo "HTTP Status: $HTTP_CODE"

          if [ "$HTTP_CODE" != "202" ]; then
            echo "ERROR: Upload failed (HTTP $HTTP_CODE)"
            echo "$BODY" | jq '.' 2>/dev/null || echo "$BODY"
            exit 1
          fi

          OP_ID=$(echo "$BODY" | jq -r '.id // empty')
          if [ -z "$OP_ID" ]; then
            echo "ERROR: No operation ID in response"
            echo "$BODY"
            exit 1
          fi
          echo "operation-id=$OP_ID" >> $GITHUB_OUTPUT
          echo "Upload started — operation: $OP_ID"

      - name: Wait for upload to process (max 3 min)
        env:
          EDGE_PRODUCT_ID: ${{ secrets.EDGE_PRODUCT_ID }}
        run: |
          OP_ID="${{ steps.upload.outputs.operation-id }}"
          MAX=18  # 18 × 10s = 3 minutes
          for i in $(seq 1 $MAX); do
            RESPONSE=$(curl -sf \
              "https://api.addons.microsoftedge.microsoft.com/v1/products/${EDGE_PRODUCT_ID}/submissions/draft/package/operations/${OP_ID}" \
              -H "Authorization: Bearer ${{ steps.token.outputs.token }}")
            STATUS=$(echo "$RESPONSE" | jq -r '.status // "Unknown"')
            MSG=$(echo "$RESPONSE" | jq -r '.message // ""')
            echo "[$i/$MAX] Status: $STATUS ${MSG:+— $MSG}"

            if [ "$STATUS" = "Succeeded" ]; then
              echo "Upload processing complete"
              exit 0
            fi
            if [ "$STATUS" = "Failed" ]; then
              echo "ERROR: Upload processing failed"
              echo "$RESPONSE" | jq '.'
              exit 1
            fi
            sleep 10
          done
          echo "ERROR: Timed out after 3 minutes"
          exit 1

      - name: Submit for review
        id: submit
        env:
          EDGE_PRODUCT_ID: ${{ secrets.EDGE_PRODUCT_ID }}
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://api.addons.microsoftedge.microsoft.com/v1/products/${EDGE_PRODUCT_ID}/submissions" \
            -H "Authorization: Bearer ${{ steps.token.outputs.token }}" \
            -H "Content-Length: 0")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          echo "HTTP Status: $HTTP_CODE"

          if [ "$HTTP_CODE" != "202" ]; then
            echo "ERROR: Submission failed (HTTP $HTTP_CODE)"
            echo "$BODY" | jq '.' 2>/dev/null || echo "$BODY"
            exit 1
          fi

          OP_ID=$(echo "$BODY" | jq -r '.id // empty')
          echo "operation-id=$OP_ID" >> $GITHUB_OUTPUT
          echo "Submitted for review — operation: $OP_ID"
          echo "The extension will go live after Microsoft review (usually 1-3 business days)"

